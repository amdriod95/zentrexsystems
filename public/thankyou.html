<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Thank you — Zentrex Systems</title>
    <meta name="description" content="Your demo request has been received. The Zentrex Systems team will be in touch shortly." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        font-family: "Plus Jakarta Sans", system-ui, -apple-system, sans-serif;
        color: #fff;
        background:
          radial-gradient(1200px 600px at 20% 10%, rgba(99,102,241,0.25), transparent 60%),
          radial-gradient(900px 500px at 85% 90%, rgba(56,189,248,0.18), transparent 60%),
          #05060f;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .card {
        max-width: 560px;
        width: 100%;
        text-align: center;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.10);
        backdrop-filter: blur(12px);
        border-radius: 24px;
        padding: 3rem 2rem;
        box-shadow: 0 30px 80px -20px rgba(79,70,229,0.45);
        animation: rise 0.6s ease-out both;
      }
      @keyframes rise {
        from { opacity: 0; transform: translateY(16px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .icon {
        width: 72px; height: 72px; margin: 0 auto 1.5rem;
        border-radius: 999px;
        background: linear-gradient(135deg, #6366f1, #38bdf8);
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 10px 30px -8px rgba(99,102,241,0.7);
        animation: pop 0.5s 0.2s ease-out both;
      }
      @keyframes pop {
        0% { transform: scale(0.4); opacity: 0; }
        70% { transform: scale(1.08); }
        100% { transform: scale(1); opacity: 1; }
      }
      .icon svg { width: 36px; height: 36px; stroke: white; }
      .eyebrow {
        font-size: 0.8rem; letter-spacing: 0.18em; text-transform: uppercase;
        color: #a5b4fc; margin-bottom: 0.75rem; font-weight: 600;
      }
      h1 {
        font-family: "Instrument Serif", Georgia, serif;
        font-weight: 400;
        font-size: clamp(2rem, 4vw, 2.75rem);
        margin: 0 0 1rem;
        line-height: 1.15;
      }
      p {
        color: rgba(255,255,255,0.72);
        font-size: 1rem;
        line-height: 1.6;
        margin: 0 auto 2rem;
        max-width: 440px;
      }
      .actions {
        display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap;
      }
      a.btn {
        display: inline-flex; align-items: center; gap: 0.5rem;
        padding: 0.85rem 1.5rem; border-radius: 12px;
        font-weight: 600; font-size: 0.95rem; text-decoration: none;
        transition: transform 0.2s, filter 0.2s;
      }
      a.btn:hover { transform: translateY(-1px); filter: brightness(1.1); }
      .btn-primary {
        background: linear-gradient(135deg, #6366f1, #38bdf8);
        color: #fff;
        box-shadow: 0 10px 24px -8px rgba(99,102,241,0.7);
      }
      .btn-ghost {
        background: rgba(255,255,255,0.06);
        color: #fff;
        border: 1px solid rgba(255,255,255,0.12);
      }
      .meta { margin-top: 1.75rem; font-size: 0.8rem; color: rgba(255,255,255,0.45); }
      .meta a { color: #a5b4fc; text-decoration: none; }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 13l4 4L19 7" />
        </svg>
      </div>
      <div class="eyebrow">Request received</div>
      <h1>Thank you — we'll be in touch.</h1>
      <p>
        Your demo request has been sent to the Zentrex Systems team. Expect a reply at the email
        you provided within one business day.
      </p>
      <div class="actions">
        <a class="btn btn-primary" href="/">Back to home</a>
        <a class="btn btn-ghost" href="mailto:Contact@zentrexsystems.com">Email us</a>
      </div>
      <div class="meta">
        Need immediate help? <a href="mailto:Contact@zentrexsystems.com">Contact@zentrexsystems.com</a>
      </div>
    </main>
  </body>
</html>
